{{- if and (eq .Values.workers.backend "kubernetes") .Values.workers.kubernetes.networkPolicy.create }}
{{- $egressPolicyEnabled := and (include "mindroom-runtime.egressProxyEnabled" .) .Values.egressProxy.networkPolicy.create -}}
{{- $proxyNamespace := include "mindroom-runtime.egressProxyNamespace" . -}}
{{- $proxyPort := include "mindroom-runtime.egressProxyServicePort" . -}}
{{- $agentVault := .Values.workers.kubernetes.agentVault -}}
{{- $dnsNamespaceSelector := .Values.egressProxy.networkPolicy.dns.namespaceSelector -}}
{{- $dnsPodSelector := .Values.egressProxy.networkPolicy.dns.podSelector -}}
{{- $hasDnsNamespaceSelector := kindIs "map" $dnsNamespaceSelector -}}
{{- $hasDnsPodSelector := kindIs "map" $dnsPodSelector -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mindroom-runtime.workerNetworkPolicyName" . }}
  namespace: {{ include "mindroom-runtime.workerNamespace" . }}
  labels:
    {{- include "mindroom-runtime.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      mindroom.ai/component: worker
      app.kubernetes.io/managed-by: mindroom
      app.kubernetes.io/name: mindroom-worker
      {{- with .Values.workers.kubernetes.extraLabels }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
  policyTypes:
    - Ingress
    {{- if $egressPolicyEnabled }}
    - Egress
    {{- end }}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace | quote }}
          podSelector:
            matchLabels:
              {{- include "mindroom-runtime.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.workers.kubernetes.port }}
  {{- if $egressPolicyEnabled }}
  egress:
    - to:
        {{- if or $hasDnsNamespaceSelector $hasDnsPodSelector }}
        -
          {{- if $hasDnsNamespaceSelector }}
          namespaceSelector:
            {{- toYaml $dnsNamespaceSelector | nindent 12 }}
          {{- end }}
          {{- if $hasDnsPodSelector }}
          podSelector:
            {{- toYaml $dnsPodSelector | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- range .Values.egressProxy.networkPolicy.dns.ipBlocks }}
        - ipBlock:
            {{- toYaml . | nindent 12 }}
        {{- end }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - {{- if and (not .Values.approvedEgress.enabled) .Values.egressProxy.networkPolicy.proxyNamespaceSelector }}
          namespaceSelector:
            {{- toYaml .Values.egressProxy.networkPolicy.proxyNamespaceSelector | nindent 12 }}
          {{- else }}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $proxyNamespace | quote }}
          {{- end }}
          podSelector:
            {{- include "mindroom-runtime.egressProxyPodSelector" . | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ $proxyPort }}
    {{- if and $agentVault.enabled $agentVault.server.enabled }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace | quote }}
          podSelector:
            matchLabels:
              {{- include "mindroom-runtime.agentVaultSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $agentVault.server.apiPort }}
    {{- end }}
    {{- with .Values.egressProxy.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if and .Values.approvedEgress.enabled .Values.approvedEgress.networkPolicy.create }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mindroom-runtime.approvedEgressNetworkPolicyName" . }}
  labels:
    {{- include "mindroom-runtime.labels" . | nindent 4 }}
spec:
  podSelector:
    {{- include "mindroom-runtime.approvedEgressPodSelector" . | nindent 4 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "mindroom-runtime.workerNamespace" . | quote }}
          podSelector:
            matchLabels:
              mindroom.ai/component: worker
              app.kubernetes.io/managed-by: mindroom
              app.kubernetes.io/name: mindroom-worker
              {{- with .Values.workers.kubernetes.extraLabels }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
      ports:
        - port: {{ .Values.approvedEgress.service.proxyPort }}
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace | quote }}
          podSelector:
            matchLabels:
              {{- include "mindroom-runtime.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.approvedEgress.service.apiPort }}
          protocol: TCP
{{- end }}
{{- if .Values.networkPolicy.create }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mindroom-runtime.networkPolicyName" . }}
  labels:
    {{- include "mindroom-runtime.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mindroom-runtime.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.extraEgress }}
    - Egress
    {{- end }}
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.runtime.apiPort }}
      {{- with .Values.networkPolicy.apiIngressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.networkPolicy.extraEgress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
