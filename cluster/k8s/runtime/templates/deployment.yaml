{{- $fullname := include "mindroom-runtime.fullname" . -}}
{{- $proxyTokenSecretName := include "mindroom-runtime.proxyTokenSecretName" . -}}
{{- $credentialsEncryptionKeySecretName := .Values.workers.sandbox.credentialsEncryptionKey.existingSecret -}}
{{- $workerNamespace := include "mindroom-runtime.workerNamespace" . -}}
{{- $workerAuthSecretName := include "mindroom-runtime.workerAuthSecretName" . -}}
{{- $eventCacheDatabaseUrlSecretName := include "mindroom-runtime.eventCacheDatabaseUrlSecretName" . -}}
{{- $eventCacheDatabaseUrlSecretKey := include "mindroom-runtime.eventCacheDatabaseUrlSecretKey" . -}}
{{- $workerExtraEnvJson := include "mindroom-runtime.workerExtraEnvJson" . -}}
{{- $approvedEgressTokenSecretName := include "mindroom-runtime.approvedEgressTokenSecretName" . -}}
{{- $approvedEgressTokenSecretKey := include "mindroom-runtime.approvedEgressTokenSecretKey" . -}}
{{- $usesConfigMapConfig := include "mindroom-runtime.usesConfigMapConfig" . -}}
{{- $configPath := include "mindroom-runtime.configPath" . -}}
{{- $workerConfigMapName := include "mindroom-runtime.workerConfigMapName" . -}}
{{- $workerConfigKey := include "mindroom-runtime.workerConfigKey" . -}}
{{- $workerConfigPath := include "mindroom-runtime.workerConfigPath" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "mindroom-runtime.labels" . | nindent 4 }}
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "mindroom-runtime.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mindroom-runtime.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "mindroom-runtime.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName | quote }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or (and .Values.stateStorage.enabled .Values.stateStorage.initPermissions.enabled) .Values.initContainers .Values.contentBundles }}
      initContainers:
{{ if and .Values.stateStorage.enabled .Values.stateStorage.initPermissions.enabled }}
        - name: prepare-state-storage
          image: {{ .Values.stateStorage.initPermissions.image | quote }}
          imagePullPolicy: {{ .Values.stateStorage.initPermissions.imagePullPolicy }}
          {{- with .Values.stateStorage.initPermissions.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p "/state"{{ if .Values.stateStorage.encryptionKeys.enabled }} "/state/{{ .Values.stateStorage.encryptionKeys.subPath }}"{{ end }}{{ if .Values.stateStorage.syncTokens.enabled }} "/state/{{ .Values.stateStorage.syncTokens.subPath }}"{{ end }}
              chown -R {{ .Values.stateStorage.initPermissions.runAsUser }}:{{ .Values.stateStorage.initPermissions.fsGroup }} "/state"{{ if .Values.stateStorage.encryptionKeys.enabled }} "/state/{{ .Values.stateStorage.encryptionKeys.subPath }}"{{ end }}{{ if .Values.stateStorage.syncTokens.enabled }} "/state/{{ .Values.stateStorage.syncTokens.subPath }}"{{ end }}
              chmod {{ .Values.stateStorage.initPermissions.chmod }} "/state"{{ if .Values.stateStorage.encryptionKeys.enabled }} "/state/{{ .Values.stateStorage.encryptionKeys.subPath }}"{{ end }}{{ if .Values.stateStorage.syncTokens.enabled }} "/state/{{ .Values.stateStorage.syncTokens.subPath }}"{{ end }}
          volumeMounts:
            - name: {{ include "mindroom-runtime.stateStorageVolumeName" . }}
              mountPath: /state
{{- end }}
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{ range $bundle := .Values.contentBundles }}
        {{- $sourcePath := include "mindroom-runtime.contentBundleSourcePath" (list $ $bundle) -}}
        {{- $targetPath := include "mindroom-runtime.contentBundleTargetPath" (list $ $bundle) -}}
        {{- $overwrite := true -}}
        {{- if hasKey $bundle "overwrite" -}}
        {{- $overwrite = $bundle.overwrite -}}
        {{- end -}}
        - name: {{ printf "content-bundle-%s" $bundle.name | trunc 63 | trimSuffix "-" }}
          image: {{ $bundle.image | quote }}
          imagePullPolicy: {{ default "IfNotPresent" $bundle.imagePullPolicy }}
          command:
            - sh
            - -ec
          args:
            - |-
              set -eu
              {{- if $overwrite }}
              rm -rf {{ $targetPath | quote }}
              {{- end }}
              mkdir -p {{ $targetPath | quote }}
              cp -a {{ printf "%s/." $sourcePath | quote }} {{ printf "%s/" $targetPath | quote }}
              {{- if and $bundle.seed $bundle.seed.enabled }}
              {{ include "mindroom-runtime.contentBundleSeedCommand" (list $bundle) }}
              {{- end }}
          volumeMounts:
            - name: {{ include "mindroom-runtime.storageVolumeName" $ }}
              mountPath: {{ $.Values.storage.mountPath }}
            {{ with $bundle.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{ end }}
          {{ with $bundle.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{ end }}
          {{ with $bundle.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{ end }}
          {{ with $bundle.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{ end }}
          {{ with $bundle.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{ end }}
        {{ end }}
      {{- end }}
      containers:
        - name: mindroom
          image: {{ include "mindroom-runtime.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - tini
            - --
            - /app/.venv/bin/mindroom
            - run
            - --api-host
            - {{ .Values.runtime.apiHost | quote }}
            - --api-port
            - {{ .Values.runtime.apiPort | quote }}
          ports:
            - name: api
              containerPort: {{ .Values.runtime.apiPort }}
              protocol: TCP
          env:
            - name: MINDROOM_STORAGE_PATH
              value: {{ .Values.storage.mountPath | quote }}
            - name: MINDROOM_CONFIG_PATH
              value: {{ $configPath | quote }}
            - name: HOME
              value: {{ .Values.storage.mountPath | quote }}
            {{- if .Values.runtime.logLevel }}
            - name: LOG_LEVEL
              value: {{ .Values.runtime.logLevel | quote }}
            {{- end }}
            {{- if .Values.runtime.timezone }}
            - name: TZ
              value: {{ .Values.runtime.timezone | quote }}
            {{- end }}
            {{- if .Values.runtime.timing }}
            - name: MINDROOM_TIMING
              value: "1"
            {{- end }}
            {{- if and (eq .Values.eventCache.backend "postgres") $eventCacheDatabaseUrlSecretName }}
            - name: {{ .Values.eventCache.databaseUrlEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ $eventCacheDatabaseUrlSecretName }}
                  key: {{ $eventCacheDatabaseUrlSecretKey }}
            {{- end }}
            - name: MINDROOM_WORKER_BACKEND
              value: {{ .Values.workers.backend | quote }}
            - name: MINDROOM_WORKER_CLEANUP_INTERVAL_SECONDS
              value: {{ .Values.workers.cleanupIntervalSeconds | quote }}
            - name: MINDROOM_SANDBOX_EXECUTION_MODE
              value: {{ .Values.workers.sandbox.executionMode | quote }}
            - name: MINDROOM_SANDBOX_PROXY_TOOLS
              value: {{ .Values.workers.sandbox.proxyTools | quote }}
            {{- if $credentialsEncryptionKeySecretName }}
            - name: MINDROOM_CREDENTIALS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $credentialsEncryptionKeySecretName }}
                  key: {{ .Values.workers.sandbox.credentialsEncryptionKey.key }}
            {{- end }}
            {{- if $proxyTokenSecretName }}
            - name: MINDROOM_SANDBOX_PROXY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $proxyTokenSecretName }}
                  key: {{ .Values.workers.sandbox.proxyToken.key }}
            {{- end }}
            {{- if .Values.approvedEgress.enabled }}
            {{- if .Values.approvedEgress.manageRuntimeConfig }}
            - name: MINDROOM_APPROVED_EGRESS_ENABLED
              value: "true"
            {{- end }}
            - name: MINDROOM_APPROVED_EGRESS_API_URL
              value: {{ include "mindroom-runtime.approvedEgressApiUrl" . | quote }}
            - name: MINDROOM_APPROVED_EGRESS_ALLOWLIST_PATH
              value: {{ .Values.approvedEgress.allowlist.mountPath | quote }}
            - name: MINDROOM_APPROVED_EGRESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $approvedEgressTokenSecretName }}
                  key: {{ $approvedEgressTokenSecretKey }}
            {{- if .Values.approvedEgress.maxTtlSeconds }}
            - name: MINDROOM_APPROVED_EGRESS_MAX_TTL_SECONDS
              value: {{ .Values.approvedEgress.maxTtlSeconds | quote }}
            {{- end }}
            {{- if .Values.approvedEgress.sandboxProxyTimeoutSeconds }}
            - name: MINDROOM_SANDBOX_PROXY_TIMEOUT_SECONDS
              value: {{ .Values.approvedEgress.sandboxProxyTimeoutSeconds | quote }}
            {{- end }}
            {{- end }}
            {{- if eq .Values.workers.backend "static_runner" }}
            - name: MINDROOM_SANDBOX_PROXY_URL
              value: {{ printf "http://localhost:%v" .Values.workers.staticRunner.port | quote }}
            {{- else if eq .Values.workers.backend "kubernetes" }}
            - name: MINDROOM_KUBERNETES_WORKER_NAMESPACE
              value: {{ include "mindroom-runtime.workerNamespace" . | quote }}
            {{- if $workerAuthSecretName }}
            - name: MINDROOM_KUBERNETES_WORKER_AUTH_SECRET_NAME
              value: {{ $workerAuthSecretName | quote }}
            {{- end }}
            - name: MINDROOM_KUBERNETES_WORKER_IMAGE
              value: {{ include "mindroom-runtime.workerImage" . | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_IMAGE_PULL_POLICY
              value: {{ default .Values.image.pullPolicy .Values.workers.kubernetes.image.pullPolicy | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_PORT
              value: {{ .Values.workers.kubernetes.port | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_SERVICE_ACCOUNT_NAME
              value: {{ include "mindroom-runtime.workerServiceAccountName" . | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_STORAGE_PVC_NAME
              value: {{ include "mindroom-runtime.storageClaimName" . | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_STORAGE_MOUNT_PATH
              value: {{ .Values.storage.mountPath | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_STORAGE_SUBPATH_PREFIX
              value: {{ .Values.workers.kubernetes.storageSubpathPrefix | quote }}
            {{- if $workerConfigMapName }}
            - name: MINDROOM_KUBERNETES_WORKER_CONFIG_MAP_NAME
              value: {{ $workerConfigMapName | quote }}
            {{- end }}
            {{- if $workerConfigKey }}
            - name: MINDROOM_KUBERNETES_WORKER_CONFIG_KEY
              value: {{ $workerConfigKey | quote }}
            {{- end }}
            - name: MINDROOM_KUBERNETES_WORKER_CONFIG_PATH
              value: {{ $workerConfigPath | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_IDLE_TIMEOUT_SECONDS
              value: {{ .Values.workers.kubernetes.idleTimeoutSeconds | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_READY_TIMEOUT_SECONDS
              value: {{ .Values.workers.kubernetes.readyTimeoutSeconds | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_RECONCILE_POD_TEMPLATES
              value: {{ .Values.workers.kubernetes.reconcilePodTemplates | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_NAME_PREFIX
              value: {{ .Values.workers.kubernetes.namePrefix | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_ENABLE_SERVICE_LINKS
              value: {{ .Values.workers.kubernetes.enableServiceLinks | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_LABELS_JSON
              value: {{ toJson .Values.workers.kubernetes.extraLabels | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_ANNOTATIONS_JSON
              value: {{ toJson .Values.workers.kubernetes.extraAnnotations | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_MEMORY_REQUEST
              value: {{ .Values.workers.kubernetes.resources.requests.memory | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_MEMORY_LIMIT
              value: {{ .Values.workers.kubernetes.resources.limits.memory | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_CPU_REQUEST
              value: {{ .Values.workers.kubernetes.resources.requests.cpu | quote }}
            - name: MINDROOM_KUBERNETES_WORKER_CPU_LIMIT
              value: {{ .Values.workers.kubernetes.resources.limits.cpu | quote }}
            {{- if .Values.workers.kubernetes.nodeName }}
            - name: MINDROOM_KUBERNETES_WORKER_NODE_NAME
              value: {{ .Values.workers.kubernetes.nodeName | quote }}
            {{- end }}
            {{- if .Values.workers.kubernetes.colocateWithControlPlaneNode }}
            - name: MINDROOM_KUBERNETES_WORKER_COLOCATE_WITH_CONTROL_PLANE_NODE
              value: "true"
            {{- end }}
            {{- if $workerExtraEnvJson }}
            - name: MINDROOM_KUBERNETES_WORKER_ENV_JSON
              value: {{ $workerExtraEnvJson | quote }}
            {{- end }}
            {{- if or .Values.workers.kubernetes.ownerDeploymentName (eq $workerNamespace .Release.Namespace) }}
            - name: MINDROOM_KUBERNETES_WORKER_OWNER_DEPLOYMENT_NAME
              value: {{ default $fullname .Values.workers.kubernetes.ownerDeploymentName | quote }}
            {{- end }}
            {{- with .Values.workers.kubernetes.agentVault }}
            {{- if .enabled }}
            - name: MINDROOM_KUBERNETES_AGENT_VAULT_ENABLED
              value: "true"
            - name: MINDROOM_KUBERNETES_AGENT_VAULT_CLI_IMAGE
              value: {{ required "workers.kubernetes.agentVault.cliImage is required when agentVault is enabled" .cliImage | quote }}
            - name: MINDROOM_KUBERNETES_AGENT_VAULT_OWNER_EMAIL
              value: {{ required "workers.kubernetes.agentVault.ownerEmail is required when agentVault is enabled" .ownerEmail | quote }}
            - name: MINDROOM_KUBERNETES_AGENT_VAULT_VAULT_NAME_PREFIX
              value: {{ .vaultNamePrefix | quote }}
            - name: MINDROOM_KUBERNETES_AGENT_VAULT_API_URL
              value: {{ .apiUrl | quote }}
            - name: MINDROOM_KUBERNETES_AGENT_VAULT_PROXY_URL
              value: {{ include "mindroom-runtime.agentVaultProxyUrl" $ | quote }}
            - name: MINDROOM_KUBERNETES_AGENT_VAULT_BOOTSTRAP_SECRET_NAME
              value: {{ .bootstrapSecretName | quote }}
            {{- if .workerCaConfigMapName }}
            - name: MINDROOM_KUBERNETES_AGENT_VAULT_WORKER_CA_CONFIGMAP_NAME
              value: {{ .workerCaConfigMapName | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- with .Values.workers.kubernetes.agentVault }}
            {{- if .accessTool.enabled }}
            - name: MINDROOM_AGENT_VAULT_ACCESS_API_URL
              value: {{ .apiUrl | quote }}
            - name: MINDROOM_AGENT_VAULT_ACCESS_UI_BASE_URL
              value: {{ required "workers.kubernetes.agentVault.accessTool.uiBaseUrl is required when the access tool is enabled" .accessTool.uiBaseUrl | quote }}
            - name: MINDROOM_AGENT_VAULT_ACCESS_EMAIL_DOMAIN
              value: {{ required "workers.kubernetes.agentVault.accessTool.emailDomain is required when the access tool is enabled" .accessTool.emailDomain | quote }}
            - name: MINDROOM_AGENT_VAULT_ACCESS_VAULT_NAME_PREFIX
              value: {{ .vaultNamePrefix | quote }}
            # Mounted Secret file, not env: the kubelet refreshes the mount in
            # place, so a bootstrap re-run (token rotation) needs no restart.
            - name: MINDROOM_AGENT_VAULT_ACCESS_ADMIN_TOKEN_FILE
              value: {{ printf "/etc/agent-vault-access/%s" .accessTool.adminTokenSecret.key | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.matrix.homeserverUrl }}
            - name: MATRIX_HOMESERVER
              value: {{ .Values.matrix.homeserverUrl | quote }}
            {{- end }}
            {{- if .Values.matrix.serverName }}
            - name: MATRIX_SERVER_NAME
              value: {{ .Values.matrix.serverName | quote }}
            {{- end }}
            {{- if .Values.matrix.startupTimeoutSeconds }}
            - name: MINDROOM_MATRIX_HOMESERVER_STARTUP_TIMEOUT_SECONDS
              value: {{ .Values.matrix.startupTimeoutSeconds | quote }}
            {{- end }}
            {{- if .Values.matrix.registrationToken.existingSecret }}
            - name: MATRIX_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.matrix.registrationToken.existingSecret }}
                  key: {{ .Values.matrix.registrationToken.key }}
            {{- end }}
            {{- range $entry := .Values.providerCredentials }}
            - name: {{ include "mindroom-runtime.providerCredentialEnvName" (list $ $entry) }}
              valueFrom:
                secretKeyRef:
                  name: {{ $entry.existingSecret }}
                  key: {{ $entry.key }}
            {{- end }}
            {{- with .Values.env.extra }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.env.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            {{- if .Values.probes.startup.custom }}
            {{- toYaml .Values.probes.startup.custom | nindent 12 }}
            {{- else }}
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: {{ .Values.probes.startup.port }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            {{- end }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            {{- if .Values.probes.readiness.custom }}
            {{- toYaml .Values.probes.readiness.custom | nindent 12 }}
            {{- else }}
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.probes.readiness.port }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            {{- end }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            {{- if .Values.probes.liveness.custom }}
            {{- toYaml .Values.probes.liveness.custom | nindent 12 }}
            {{- else }}
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.probes.liveness.port }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if $usesConfigMapConfig }}
            - name: config
              mountPath: {{ .Values.config.mountPath }}
              subPath: {{ .Values.config.key }}
              readOnly: true
            {{- end }}
            - name: {{ include "mindroom-runtime.storageVolumeName" . }}
              mountPath: {{ .Values.storage.mountPath }}
            {{- if .Values.stateStorage.enabled }}
            {{- if .Values.stateStorage.mountPath }}
            - name: {{ include "mindroom-runtime.stateStorageVolumeName" . }}
              mountPath: {{ .Values.stateStorage.mountPath }}
            {{- end }}
            {{- if .Values.stateStorage.encryptionKeys.enabled }}
            - name: {{ include "mindroom-runtime.stateStorageVolumeName" . }}
              mountPath: {{ .Values.stateStorage.encryptionKeys.mountPath }}
              subPath: {{ .Values.stateStorage.encryptionKeys.subPath }}
            {{- end }}
            {{- if .Values.stateStorage.syncTokens.enabled }}
            - name: {{ include "mindroom-runtime.stateStorageVolumeName" . }}
              mountPath: {{ .Values.stateStorage.syncTokens.mountPath }}
              subPath: {{ .Values.stateStorage.syncTokens.subPath }}
            {{- end }}
            {{- end }}
            {{- if .Values.approvedEgress.enabled }}
            - name: approved-egress-allowlist
              mountPath: {{ .Values.approvedEgress.allowlist.mountPath | quote }}
              subPath: {{ .Values.approvedEgress.allowlist.key | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.workers.kubernetes.agentVault.accessTool.enabled }}
            - name: agent-vault-access-admin
              mountPath: /etc/agent-vault-access
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if eq .Values.workers.backend "static_runner" }}
        - name: sandbox-runner
          image: {{ include "mindroom-runtime.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - tini
            - --
            - /app/run-sandbox-runner.sh
          ports:
            - name: sandbox
              containerPort: {{ .Values.workers.staticRunner.port }}
              protocol: TCP
          env:
            - name: MINDROOM_SANDBOX_RUNNER_MODE
              value: "true"
            - name: MINDROOM_SANDBOX_RUNNER_PORT
              value: {{ .Values.workers.staticRunner.port | quote }}
            - name: MINDROOM_CONFIG_PATH
              value: {{ $configPath | quote }}
            - name: MINDROOM_STORAGE_PATH
              value: {{ .Values.storage.mountPath | quote }}
            - name: HOME
              value: {{ .Values.storage.mountPath | quote }}
            {{- if $proxyTokenSecretName }}
            - name: MINDROOM_SANDBOX_PROXY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $proxyTokenSecretName }}
                  key: {{ .Values.workers.sandbox.proxyToken.key }}
            {{- end }}
            {{- if $credentialsEncryptionKeySecretName }}
            - name: MINDROOM_CREDENTIALS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $credentialsEncryptionKeySecretName }}
                  key: {{ .Values.workers.sandbox.credentialsEncryptionKey.key }}
            {{- end }}
          resources:
            {{- toYaml .Values.workers.staticRunner.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if $usesConfigMapConfig }}
            - name: config
              mountPath: {{ .Values.config.mountPath }}
              subPath: {{ .Values.config.key }}
              readOnly: true
            {{- end }}
            - name: {{ include "mindroom-runtime.storageVolumeName" . }}
              mountPath: {{ .Values.storage.mountPath }}
            - name: sandbox-workspace
              mountPath: /app/workspace
        {{- end }}
        {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        {{- if $usesConfigMapConfig }}
        - name: config
          configMap:
            name: {{ include "mindroom-runtime.configMapName" . }}
        {{- end }}
        - name: {{ include "mindroom-runtime.storageVolumeName" . }}
          persistentVolumeClaim:
            claimName: {{ include "mindroom-runtime.storageClaimName" . }}
        {{- if .Values.stateStorage.enabled }}
        - name: {{ include "mindroom-runtime.stateStorageVolumeName" . }}
          persistentVolumeClaim:
            claimName: {{ include "mindroom-runtime.stateStorageClaimName" . }}
        {{- end }}
        {{- if .Values.approvedEgress.enabled }}
        - name: approved-egress-allowlist
          configMap:
            name: {{ include "mindroom-runtime.approvedEgressConfigMapName" . }}
        {{- end }}
        {{- if eq .Values.workers.backend "static_runner" }}
        - name: sandbox-workspace
          emptyDir: {}
        {{- end }}
        {{- if .Values.workers.kubernetes.agentVault.accessTool.enabled }}
        - name: agent-vault-access-admin
          secret:
            secretName: {{ .Values.workers.kubernetes.agentVault.accessTool.adminTokenSecret.name }}
            # Optional: lets the control plane start before the first
            # bootstrap publishes the token; the tool errors cleanly until then.
            optional: true
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
