# Runtime-only MindRoom chart.
# This chart intentionally avoids platform-specific defaults.
# It can create MindRoom runtime storage and event-cache resources, while Matrix, ingress, model gateways, and deployment-specific secrets come from your own cluster.

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/mindroom-ai/mindroom
  tag: latest
  digest: ""
  pullPolicy: Always

imagePullSecrets: []

deploymentAnnotations: {}
podAnnotations: {}
podLabels: {}
# Leave empty for the chart default.
# Set this when adopting an existing Deployment whose selector is immutable.
selectorLabels: {}
priorityClassName: ""
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: true

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8765
  annotations: {}

podDisruptionBudget:
  create: false
  maxUnavailable: 1
  minAvailable: ""

runtime:
  apiHost: 0.0.0.0
  apiPort: 8765
  logLevel: INFO
  timezone: ""
  timing: false

config:
  create: true
  existingConfigMap: ""
  key: config.yaml
  mountPath: /app/config.yaml
  # Leave empty to render the chart's minimal default config, including the event-cache settings below.
  # Set this when you want full control over the generated config file.
  data: ""

eventCache:
  # The runtime chart defaults to PostgreSQL because Kubernetes deployments need a restart-safe cache backend.
  # Set this to sqlite for lightweight installs.
  backend: postgres
  # Logical namespace for rows in a shared PostgreSQL event-cache database.
  # Defaults to the Helm release namespace.
  namespace: ""
  databaseUrlEnv: MINDROOM_EVENT_CACHE_DATABASE_URL
  databaseUrl:
    # Use this for an externally managed PostgreSQL database, or when adopting an existing Secret for a chart-managed database.
    # The secret should contain a full psycopg-compatible connection string.
    existingSecret: ""
    key: ""
  sqlite:
    dbPath: ""
  postgres:
    create: true
    nameOverride: ""
    # Leave empty for the chart default.
    # Set this when adopting an existing StatefulSet whose selector is immutable.
    selectorLabels: {}
    image:
      repository: postgres
      tag: "17"
      pullPolicy: IfNotPresent
    service:
      port: 5432
      annotations: {}
    auth:
      database: mindroom_cache
      username: mindroom_cache
      # Existing password Secret for a chart-managed PostgreSQL database.
      existingSecret: ""
      # Leave empty to generate and preserve a random password during Helm upgrades.
      # Set a value for deterministic helm template output.
      password: ""
      passwordKey: password
    persistence:
      enabled: true
      volumeName: data
      # Leave true for chart-created StatefulSets and upgrades.
      # Set false when adopting an existing StatefulSet whose volumeClaimTemplate has no chart labels.
      includeChartLabels: true
      # Extra labels for the StatefulSet volumeClaimTemplates metadata.
      labels: {}
      accessModes:
        - ReadWriteOnce
      storageClassName: ""
      size: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
    podAnnotations: {}
    podLabels: {}
    podSecurityContext: {}
    securityContext: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    networkPolicy:
      create: true
      name: ""

storage:
  create: true
  existingClaim: ""
  volumeName: storage
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  size: 10Gi
  mountPath: /app/agent_data

stateStorage:
  # Optional dedicated PVC for restart-critical Matrix client state.
  enabled: false
  create: false
  existingClaim: ""
  volumeName: state-storage
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  size: 10Gi
  mountPath: /app/mindroom_state
  encryptionKeys:
    enabled: true
    mountPath: /app/agent_data/encryption_keys
    subPath: encryption_keys
  syncTokens:
    enabled: true
    mountPath: /app/agent_data/sync_tokens
    subPath: sync_tokens
  initPermissions:
    enabled: true
    image: busybox:1.36
    imagePullPolicy: IfNotPresent
    # The init container uses chown/chmod and therefore runs as root by default.
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
      allowPrivilegeEscalation: false
    runAsUser: 1000
    fsGroup: 1000
    chmod: "2775"

env:
  # Raw Kubernetes EnvVar entries appended to the MindRoom container.
  extra: []
  # Raw Kubernetes EnvFromSource entries appended to the MindRoom container.
  envFrom: []

matrix:
  homeserverUrl: ""
  serverName: ""
  startupTimeoutSeconds: ""
  registrationToken:
    existingSecret: ""
    key: MATRIX_REGISTRATION_TOKEN

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 2Gi

probes:
  startup:
    enabled: true
    custom: {}
    path: /api/ready
    port: api
    periodSeconds: 5
    timeoutSeconds: 10
    failureThreshold: 120
  readiness:
    enabled: true
    custom: {}
    path: /api/ready
    port: api
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    enabled: true
    custom: {}
    path: /api/health
    port: api
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 6

workers:
  # static_runner keeps a sandbox-runner sidecar in this pod.
  # kubernetes lets the MindRoom runtime create worker Deployments on demand.
  backend: static_runner
  cleanupIntervalSeconds: 30
  sandbox:
    executionMode: selective
    proxyTools: shell,file,python
    proxyToken:
      # Prefer existingSecret in production. value creates a chart-managed Secret.
      existingSecret: ""
      key: MINDROOM_SANDBOX_PROXY_TOKEN
      value: ""
    credentialsEncryptionKey:
      # Optional Secret reference used by the primary runtime and static runner sidecar.
      existingSecret: ""
      key: MINDROOM_CREDENTIALS_ENCRYPTION_KEY
  staticRunner:
    port: 8766
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  kubernetes:
    namespace: ""
    image:
      repository: ""
      tag: ""
      digest: ""
      pullPolicy: ""
    serviceAccount:
      create: true
      name: ""
      annotations: {}
      automountServiceAccountToken: false
    rbac:
      create: true
    networkPolicy:
      create: true
      name: ""
    port: 8766
    readyTimeoutSeconds: 60
    idleTimeoutSeconds: 1800
    namePrefix: mindroom-worker
    storageSubpathPrefix: workers
    enableServiceLinks: false
    configMapName: ""
    configKey: ""
    configPath: ""
    ownerDeploymentName: ""
    nodeName: ""
    colocateWithControlPlaneNode: false
    extraEnv: {}
    extraLabels: {}
    extraAnnotations: {}
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

# Optional external HTTP proxy for dedicated Kubernetes workers.
# This chart can point worker pods at an existing proxy Service and, when
# requested, restrict worker egress so direct internet access must go through
# that proxy.
egressProxy:
  enabled: false
  injectWorkerProxyEnv: true
  service:
    name: mindroom-egress-proxy
    namespace: ""
    port: 3128
    scheme: http
  noProxy:
    - localhost
    - 127.0.0.1
    - ::1
  networkPolicy:
    create: true
    # Labels selecting the existing proxy pods. NetworkPolicy cannot target a Service directly.
    proxyPodSelector: {}
    proxyNamespaceSelector: {}
    dns:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
      ipBlocks: []
    # Raw Kubernetes NetworkPolicyEgressRule entries appended after DNS and proxy rules.
    extraEgress: []

# Optional chart-managed approved egress proxy for dedicated Kubernetes workers.
# Enabling this deploys the proxy side and automatically points worker proxy
# settings at it. Worker direct egress still depends on the worker NetworkPolicy.
approvedEgress:
  enabled: false
  image:
    repository: ghcr.io/mindroom-ai/mindroom-egress-proxy
    # Pin a tag or digest before enabling this feature.
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: true
  rbac:
    create: true
  service:
    # Leave empty for <fullname>-egress-proxy.
    name: ""
    proxyPort: 3128
    apiPort: 8080
    annotations: {}
  token:
    # Leave empty to reuse workers.sandbox.proxyToken.
    existingSecret: ""
    key: MINDROOM_SANDBOX_PROXY_TOKEN
  allowlist:
    domains: []
    existingConfigMap: ""
    key: allowed-domains.txt
    mountPath: /etc/mindroom-egress/allowed-domains.txt
  persistence:
    enabled: true
    existingClaim: ""
    size: 10Gi
    storageClassName: ""
  dataPath: /var/lib/mindroom-egress
  dbFileName: grants.sqlite3
  maxTtlSeconds: 21600
  sandboxProxyTimeoutSeconds: ""
  logLevel: info
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
  networkPolicy:
    create: true
    name: ""

initContainers: []
extraContainers: []
extraVolumes: []
extraVolumeMounts: []
