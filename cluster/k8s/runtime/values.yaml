# Runtime-only MindRoom chart.
# This chart intentionally avoids platform-specific defaults.
# It can create MindRoom runtime storage and event-cache resources, while Matrix, ingress, model gateways, and deployment-specific secrets come from your own cluster.

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/mindroom-ai/mindroom
  tag: latest
  digest: ""
  pullPolicy: Always

imagePullSecrets: []

deploymentAnnotations: {}
podAnnotations: {}
podLabels: {}
# Leave empty for the chart default.
# Set this when adopting an existing Deployment whose selector is immutable.
selectorLabels: {}
priorityClassName: ""
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: true

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8765
  annotations: {}

podDisruptionBudget:
  create: false
  maxUnavailable: 1
  minAvailable: ""

# Optional NetworkPolicy for the MindRoom control-plane pod.
# When created, pod ingress is limited to the runtime API port from the configured peers.
networkPolicy:
  create: false
  name: ""
  # NetworkPolicyPeer entries allowed to reach the runtime API port, for example an edge proxy and known in-cluster clients.
  # NetworkPolicy targets pods rather than Services, so selectors must match the client pods.
  # A bare podSelector only matches pods in the release namespace; combine namespaceSelector and podSelector for cross-namespace clients.
  # Leave empty to allow the API port from all sources while still denying other ingress.
  apiIngressFrom: []
  # Example:
  # apiIngressFrom:
  #   - podSelector:
  #       matchLabels:
  #         app.kubernetes.io/name: my-ingress
  # Raw Kubernetes NetworkPolicyIngressRule entries appended after the API rule.
  extraIngress: []
  # Raw Kubernetes NetworkPolicyEgressRule entries.
  # Setting any entry adds Egress to policyTypes, so include every egress flow the runtime needs.
  extraEgress: []

runtime:
  apiHost: 0.0.0.0
  apiPort: 8765
  logLevel: INFO
  timezone: ""
  timing: false

config:
  # configMap keeps the existing chart-managed or externally managed ConfigMap behavior.
  # file reads an absolute path that already exists in the runtime filesystem, commonly copied by contentBundles.
  source: configMap
  path: ""
  create: true
  existingConfigMap: ""
  key: config.yaml
  mountPath: /app/config.yaml
  # Leave empty to render the chart's minimal default config, including the event-cache settings below.
  # Set this when you want full control over the generated config file.
  data: ""

eventCache:
  # The runtime chart defaults to PostgreSQL because Kubernetes deployments need a restart-safe cache backend.
  # Set this to sqlite for lightweight installs.
  backend: postgres
  # Logical namespace for rows in a shared PostgreSQL event-cache database.
  # Defaults to the Helm release namespace.
  namespace: ""
  databaseUrlEnv: MINDROOM_EVENT_CACHE_DATABASE_URL
  databaseUrl:
    # Use this for an externally managed PostgreSQL database, or when adopting an existing Secret for a chart-managed database.
    # The secret should contain a full psycopg-compatible connection string.
    existingSecret: ""
    key: ""
  sqlite:
    dbPath: ""
  postgres:
    create: true
    nameOverride: ""
    # Leave empty for the chart default.
    # Set this when adopting an existing StatefulSet whose selector is immutable.
    selectorLabels: {}
    image:
      repository: postgres
      tag: "17"
      pullPolicy: IfNotPresent
    service:
      port: 5432
      annotations: {}
    auth:
      database: mindroom_cache
      username: mindroom_cache
      # Existing password Secret for a chart-managed PostgreSQL database.
      existingSecret: ""
      # Leave empty to generate and preserve a random password during Helm upgrades.
      # Set a value for deterministic helm template output.
      password: ""
      passwordKey: password
    persistence:
      enabled: true
      volumeName: data
      # Leave true for chart-created StatefulSets and upgrades.
      # Set false when adopting an existing StatefulSet whose volumeClaimTemplate has no chart labels.
      includeChartLabels: true
      # Extra labels for the StatefulSet volumeClaimTemplates metadata.
      labels: {}
      accessModes:
        - ReadWriteOnce
      storageClassName: ""
      size: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
    podAnnotations: {}
    podLabels: {}
    podSecurityContext: {}
    securityContext: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    networkPolicy:
      create: true
      name: ""

storage:
  create: true
  existingClaim: ""
  volumeName: storage
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  size: 10Gi
  mountPath: /app/agent_data

stateStorage:
  # Optional dedicated PVC for restart-critical Matrix client state.
  enabled: false
  create: false
  existingClaim: ""
  volumeName: state-storage
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  size: 10Gi
  mountPath: /app/mindroom_state
  encryptionKeys:
    enabled: true
    mountPath: /app/agent_data/encryption_keys
    subPath: encryption_keys
  syncTokens:
    enabled: true
    mountPath: /app/agent_data/sync_tokens
    subPath: sync_tokens
  initPermissions:
    enabled: true
    image: busybox:1.36
    imagePullPolicy: IfNotPresent
    # The init container uses chown/chmod and therefore runs as root by default.
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
      allowPrivilegeEscalation: false
    runAsUser: 1000
    fsGroup: 1000
    chmod: "2775"

# Immutable content bundles copied into runtime storage before MindRoom starts.
# Bundle images should be pinned by digest and contain files under sourcePath.
# The default target path is <storage.mountPath>/content-bundles/<name>.
contentBundles: []
# Example:
# contentBundles:
#   - name: team-config
#     image: registry.example.com/team/mindroom-config@sha256:1111111111111111111111111111111111111111111111111111111111111111
#     sourcePath: /bundle
#     targetPath: /app/agent_data/content-bundles/team-config
#     seed:
#       enabled: true
#       command:
#         - /app/agent_data/content-bundles/team-config/scripts/seed-content.sh
# Then point MindRoom at a config file copied by the bundle:
# config:
#   source: file
#   path: /app/agent_data/content-bundles/team-config/content/environments/prod/agent-config.yaml

# Model-provider API keys sourced from existing Kubernetes Secrets.
# Each entry binds one Secret key to the provider's native credential env var
# (for example OPENAI_API_KEY); at startup the runtime syncs that value into
# its credential service as <storage.mountPath>/credentials/<provider>_credentials.json.
# Supported providers mirror PROVIDER_ENV_KEYS in src/mindroom/constants.py:
# anthropic, azure, openai, google, openrouter, deepseek, cerebras, groq, ollama.
providerCredentials: []
# Example:
# providerCredentials:
#   - provider: openai
#     existingSecret: my-llm-secret
#     key: api-key
#   - provider: anthropic
#     existingSecret: my-llm-secret
#     key: anthropic-api-key

env:
  # Raw Kubernetes EnvVar entries appended to the MindRoom container.
  extra: []
  # Raw Kubernetes EnvFromSource entries appended to the MindRoom container.
  envFrom: []

matrix:
  homeserverUrl: ""
  serverName: ""
  startupTimeoutSeconds: ""
  registrationToken:
    existingSecret: ""
    key: MATRIX_REGISTRATION_TOKEN

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 2Gi

probes:
  startup:
    enabled: true
    custom: {}
    path: /api/ready
    port: api
    periodSeconds: 5
    timeoutSeconds: 10
    failureThreshold: 120
  readiness:
    enabled: true
    custom: {}
    path: /api/ready
    port: api
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    enabled: true
    custom: {}
    path: /api/health
    port: api
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 6

workers:
  # static_runner keeps a sandbox-runner sidecar in this pod.
  # kubernetes lets the MindRoom runtime create worker Deployments on demand.
  backend: static_runner
  cleanupIntervalSeconds: 30
  sandbox:
    executionMode: selective
    proxyTools: shell,file,python
    proxyToken:
      # Prefer existingSecret in production. value creates a chart-managed Secret.
      existingSecret: ""
      key: MINDROOM_SANDBOX_PROXY_TOKEN
      value: ""
    credentialsEncryptionKey:
      # Optional Secret reference used by the primary runtime and static runner sidecar.
      existingSecret: ""
      key: MINDROOM_CREDENTIALS_ENCRYPTION_KEY
  staticRunner:
    port: 8766
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  kubernetes:
    namespace: ""
    image:
      repository: ""
      tag: ""
      digest: ""
      pullPolicy: ""
    serviceAccount:
      create: true
      name: ""
      annotations: {}
      automountServiceAccountToken: false
    rbac:
      create: true
    networkPolicy:
      create: true
      name: ""
    port: 8766
    readyTimeoutSeconds: 60
    idleTimeoutSeconds: 1800
    # Recreate scaled-down worker Deployments whose pod template (image, env,
    # resources) drifted from current config during each cleanup interval.
    # Running workers are recreated on their next provisioning after scale-down.
    reconcilePodTemplates: true
    namePrefix: mindroom-worker
    storageSubpathPrefix: workers
    enableServiceLinks: false
    configMapName: ""
    configKey: ""
    configPath: ""
    ownerDeploymentName: ""
    nodeName: ""
    colocateWithControlPlaneNode: false
    extraEnv: {}
    extraLabels: {}
    extraAnnotations: {}
    extraContainers: []
    extraVolumes: []
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    # Per-worker Agent Vault egress. When enabled, each dedicated worker pod
    # gets an init container that mints a proxy-role Agent Vault token for that
    # worker's vault into an in-pod volume; the sandbox runner composes
    # http://<token>:<vault>@<proxyUrl host> for python/shell egress. No separate
    # bridge pod or Service is created.
    #
    # NOTE: if egressProxy/approvedEgress NetworkPolicies are also enabled,
    # workers still need Agent Vault API egress (apiUrl) so the init container
    # can mint the per-worker token. For a chart-managed vault server, the chart
    # opens that API egress automatically. For externally managed vaults, add
    # an explicit API-only egress rule. Do not open direct worker egress to the
    # Agent Vault proxy port when approvedEgress owns dynamic grants; enable
    # approvedEgress.parentProxy so Squid remains the first hop and forwards
    # token-bearing traffic to the vault parent.
    agentVault:
      enabled: false
      # Agent Vault CLI image used by the init container to mint per-worker
      # proxy-role agent tokens. Required when enabled.
      cliImage: ""
      # Agent Vault instance owner email used for provisioning and worker token
      # minting. Required when enabled. When accessTool is enabled, self-service
      # grants also keep this owner admin on each worker vault so the init
      # container can attach the proxy-role agent even for user-created vaults.
      ownerEmail: ""
      # Prefix for the per-worker vault name (worker_id_for_key); the
      # agent_vault_access tool must use the same prefix
      # (MINDROOM_AGENT_VAULT_ACCESS_VAULT_NAME_PREFIX) so the UI manages the
      # same vault the worker reads.
      vaultNamePrefix: agent-vault
      apiUrl: http://agent-vault:14321
      proxyUrl: http://agent-vault:14322
      # Secret in the worker namespace holding AGENT_VAULT_OWNER_PASSWORD.
      bootstrapSecretName: agent-vault-bootstrap
      # Optional ConfigMap (key ca.pem) with the Agent Vault root CA; when set,
      # worker pods mount it at /etc/agent-vault/ca.pem so brokered HTTPS
      # traffic can trust the vault's TLS interception.
      workerCaConfigMapName: ""
      # Optionally run the Agent Vault server in-cluster. Leave disabled to
      # point apiUrl/proxyUrl at an externally managed Agent Vault instance.
      server:
        enabled: false
        # Service/Deployment name. Must match the host in apiUrl/proxyUrl.
        name: agent-vault
        # Agent Vault server image, pinned by digest; defaults to cliImage.
        image: ""
        imagePullPolicy: IfNotPresent
        apiPort: 14321
        mitmPort: 14322
        # Key in bootstrapSecretName holding the master password that protects
        # the vault's encryption key.
        masterPasswordSecretKey: AGENT_VAULT_MASTER_PASSWORD
        persistence:
          enabled: true
          size: 1Gi
          storageClassName: ""
          existingClaim: ""
        # Optional SMTP for signup verification emails. When disabled, the
        # server logs verification codes for the owner to relay manually.
        smtp:
          enabled: false
          host: ""
          port: 587
          # starttls | implicit | none
          tlsMode: starttls
          fromName: Agent Vault
          # Secret with keys AGENT_VAULT_SMTP_USERNAME, AGENT_VAULT_SMTP_PASSWORD,
          # and AGENT_VAULT_SMTP_FROM.
          existingSecret: ""
        podSecurityContext:
          fsGroup: 101
          fsGroupChangePolicy: OnRootMismatch
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources: {}
      # Optional one-shot bootstrap Job: create/log in the instance owner, set
      # instance policy (invite-only, allowed signup domains), and publish the
      # root CA into workerCaConfigMapName so worker pods trust the vault's TLS
      # interception. Re-runs are idempotent.
      bootstrap:
        enabled: false
        # Agent Vault image, pinned by digest; defaults to cliImage.
        image: ""
        # Image providing kubectl, used to publish the CA ConfigMap. Required
        # when enabled.
        kubectlImage: ""
        # Key in bootstrapSecretName holding the owner account password.
        ownerPasswordSecretKey: AGENT_VAULT_OWNER_PASSWORD
        # Comma-separated signup domain allowlist; empty means no restriction.
        allowedDomains: ""
        inviteOnly: true
        resources: {}
      # Optional wiring for the agent_vault_access tool: agents grant their
      # requester UI access to the vault backing their own worker. When
      # bootstrap.enabled, the bootstrap Job mints an owner-role agent and
      # publishes its token into adminTokenSecret; the control plane reads it
      # from a mounted file so a bootstrap re-run (token rotation) takes
      # effect without a restart.
      accessTool:
        enabled: false
        # Public base URL of the (deployer-gated) Agent Vault UI, e.g.
        # https://example.com/agent-vault. Required when enabled.
        uiBaseUrl: ""
        # Domain that maps a requester's Matrix localpart to their vault
        # account email. Required when enabled.
        emailDomain: ""
        # Owner-role agent the bootstrap Job creates/rotates for the tool.
        adminAgentName: access-admin
        # Secret the bootstrap Job publishes the token into (and the control
        # plane mounts). Provide it yourself when bootstrap is disabled.
        adminTokenSecret:
          name: agent-vault-access-admin
          key: token
      # Optional declarative Agent Vault UI/admin grants for worker vaults.
      # This controls raw secret visibility and management only. It does not
      # restrict which users may cause a shared agent to use credentials at
      # runtime.
      accessGrants:
        enabled: false
        # Optional tenant/account identifiers used in MindRoom worker-key
        # derivation. Set these to the same values the runtime receives through
        # CUSTOMER_ID or ACCOUNT_ID when your deployment uses tenant-specific
        # worker keys. Leave empty for the runtime default tenant.
        tenantId: ""
        accountId: ""
        # Existing Secret holding an owner/admin token for Agent Vault. When
        # bootstrap.enabled is true, the bootstrap Job publishes the same
        # owner-role token it uses for accessTool into this Secret too.
        # If accessTool uses the same Secret name, use the same key or a
        # different Secret name so bootstrap never applies one Secret twice.
        adminTokenSecret:
          name: agent-vault-access-admin
          key: token
        waitReadySeconds: 180
        resources: {}
        # Each grant gives an email raw UI/admin access to the resolved worker
        # vault. Supported workerScope values are shared, user, and user_agent.
        # For workerScope=user, omit agent; use workerScope=user_agent when the
        # vault should be both requester- and agent-specific.
        # Supported role is admin.
        grants: []
        # Example:
        # grants:
        #   - email: user@example.com
        #     workerScope: shared
        #     agent: example-agent
        #     role: admin
        #   - email: user@example.com
        #     workerScope: user_agent
        #     requester: "@user:example.com"
        #     agent: example-agent
        #     role: admin
        #   - email: user@example.com
        #     workerScope: user
        #     requester: "@user:example.com"
        #     role: admin

# Optional external HTTP proxy for dedicated Kubernetes workers.
# This chart can point worker pods at an existing proxy Service and, when
# requested, restrict worker egress so direct internet access must go through
# that proxy.
egressProxy:
  enabled: false
  injectWorkerProxyEnv: true
  service:
    name: mindroom-egress-proxy
    namespace: ""
    port: 3128
    scheme: http
  noProxy:
    - localhost
    - 127.0.0.1
    - ::1
  networkPolicy:
    create: true
    # Labels selecting the existing proxy pods. NetworkPolicy cannot target a Service directly.
    proxyPodSelector: {}
    proxyNamespaceSelector: {}
    dns:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
      ipBlocks: []
    # Raw Kubernetes NetworkPolicyEgressRule entries appended after DNS and proxy rules.
    extraEgress: []

# Optional chart-managed approved egress proxy for dedicated Kubernetes workers.
# Enabling this deploys the proxy side and automatically points worker proxy
# settings at it. Worker direct egress still depends on the worker NetworkPolicy.
approvedEgress:
  enabled: false
  # Set false when the authored config already wires approved_egress (for example
  # per-agent tool entries) and MindRoom should not add it to defaults at runtime.
  manageRuntimeConfig: true
  image:
    repository: ghcr.io/mindroom-ai/mindroom-egress-proxy
    # Pin a tag or digest before enabling this feature.
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: true
  rbac:
    create: true
  service:
    # Leave empty for <fullname>-egress-proxy.
    name: ""
    proxyPort: 3128
    apiPort: 8080
    annotations: {}
  token:
    # Leave empty to reuse workers.sandbox.proxyToken.
    existingSecret: ""
    key: MINDROOM_SANDBOX_PROXY_TOKEN
  allowlist:
    domains: []
    existingConfigMap: ""
    key: allowed-domains.txt
    mountPath: /etc/mindroom-egress/allowed-domains.txt
  persistence:
    enabled: true
    existingClaim: ""
    size: 10Gi
    storageClassName: ""
  dataPath: /var/lib/mindroom-egress
  dbFileName: grants.sqlite3
  maxTtlSeconds: 21600
  sandboxProxyTimeoutSeconds: ""
  logLevel: info
  # Optional parent proxy for token-bearing worker traffic. This is primarily
  # for Agent Vault: workers proxy to approved egress first, so dynamic grants
  # resolve from the real worker source IP, then Squid forwards requests with a
  # Proxy-Authorization header to the Agent Vault MITM proxy for credential
  # injection. Tokenless traffic egresses direct from Squid after the normal
  # allowlist/grant check.
  parentProxy:
    enabled: false
    host: agent-vault
    port: 14322
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
  networkPolicy:
    create: true
    name: ""

initContainers: []
extraContainers: []
extraVolumes: []
extraVolumeMounts: []
