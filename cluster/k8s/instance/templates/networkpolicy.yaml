{{- $workerBackend := .Values.workerBackend | default "static_runner" -}}
{{- $workerPort := 8766 -}}
{{- if eq $workerBackend "kubernetes" -}}
{{- $workerPort = (.Values.kubernetesWorkerPort | default 8766) -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: instance-traffic-controls-{{ .Values.customer }}
  namespace: mindroom-instances
  labels:
    app.kubernetes.io/name: mindroom-instance
    customer: {{ .Values.customer | quote }}
spec:
  podSelector:
    matchLabels:
      customer: {{ .Values.customer | quote }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow only ingress-nginx and same-instance pods to reach the public service ports.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/component: controller
          app.kubernetes.io/name: ingress-nginx
    - podSelector:
        matchLabels:
          customer: {{ .Values.customer | quote }}
    ports:
    - port: 8765    # MindRoom runtime (bundled dashboard + API)
    - port: 8008    # synapse HTTP
  # Allow the primary runtime to reach dedicated worker pods.
  - from:
    - podSelector:
        matchLabels:
          app: mindroom
          customer: {{ .Values.customer | quote }}
    ports:
    - port: {{ $workerPort }}
  egress:
  # Allow intra-instance traffic between MindRoom and Synapse pods.
  - to:
    - podSelector:
        matchLabels:
          customer: {{ .Values.customer | quote }}
    ports:
    - port: 8008
    - port: 8765
    - port: {{ $workerPort }}
  # Allow DNS
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Allow HTTP/HTTPS outbound
  - ports:
    - port: 80
    - port: 443
