{{- $workerBackend := .Values.workerBackend | default "static_runner" -}}
{{- $instanceNamespace := "mindroom-instances" -}}
{{- $workerManagerServiceAccountName := printf "mindroom-worker-manager-%s" .Values.customer -}}
{{- $workerServiceAccountName := .Values.kubernetesWorkerServiceAccountName | default "default" -}}
{{- $workerImage := .Values.kubernetesWorkerImage | default .Values.mindroom_image | default "ghcr.io/mindroom-ai/mindroom:latest" -}}
{{- $workerImagePullPolicy := .Values.kubernetesWorkerImagePullPolicy | default .Values.mindroom_image_pull_policy | default "Always" -}}
{{- $storageAccessMode := .Values.storageAccessMode | default "ReadWriteOnce" -}}
{{- $controlPlaneNodeName := .Values.controlPlaneNodeName | default "" -}}
{{- $trustedUpstreamAuth := .Values.trustedUpstreamAuth | default (dict) -}}
{{- $trustedUpstreamAuthEnabledValue := lower (toString ($trustedUpstreamAuth.enabled | default false)) -}}
{{- $trustedUpstreamAuthEnabled := has $trustedUpstreamAuthEnabledValue (list "1" "true" "yes" "on") -}}
{{- $trustedUpstreamRequireJwtValue := lower (toString ($trustedUpstreamAuth.requireJwt | default false)) -}}
{{- $trustedUpstreamRequireJwt := has $trustedUpstreamRequireJwtValue (list "1" "true" "yes" "on") -}}
{{- $instanceSecretName := include "mindroom.instanceSecretName" .Values -}}
{{- $instanceSecretHash := include "mindroom.instanceSecretHash" .Values -}}
{{- $configHash := printf "%s|%s|%s|%s|%s|%s|%s|%s|%s|%s|%s|%s|%s|%s|%s|%s|%s|%s|%s|%s|%s|%s" (.Values.customer | toString) (.Values.baseDomain | toString) (.Values.accountId | default "" | toString) (.Values.storagePath | toString) (.Values.workerBackend | default "static_runner" | toString) (.Values.supabaseUrl | default "" | toString) (.Values.supabaseAnonKey | default "" | toString) ($trustedUpstreamAuth.enabled | default "" | toString) ($trustedUpstreamAuth.userIdHeader | default "" | toString) ($trustedUpstreamAuth.emailHeader | default "" | toString) ($trustedUpstreamAuth.matrixUserIdHeader | default "" | toString) ($trustedUpstreamAuth.emailToMatrixUserIdTemplate | default "" | toString) ($trustedUpstreamAuth.requireJwt | default "" | toString) ($trustedUpstreamAuth.jwtHeader | default "" | toString) ($trustedUpstreamAuth.jwksUrl | default "" | toString) ($trustedUpstreamAuth.jwtAudience | default "" | toString) ($trustedUpstreamAuth.jwtIssuer | default "" | toString) ($trustedUpstreamAuth.jwtEmailClaim | default "email" | toString) ($trustedUpstreamAuth.jwtUserIdClaim | default "" | toString) ($trustedUpstreamAuth.jwtMatrixUserIdClaim | default "" | toString) (.Values.authorizationGlobalUsers | default (list) | toJson) (.Values.matrixRoomAccess | default (dict) | toJson) | sha256sum -}}
{{- if and (eq $workerBackend "kubernetes") (ne $storageAccessMode "ReadWriteMany") (eq $controlPlaneNodeName "") -}}
{{- fail "workerBackend=kubernetes with shared storage requires either storageAccessMode=ReadWriteMany or controlPlaneNodeName to keep the control plane and workers on one node" -}}
{{- end -}}
{{- if and $trustedUpstreamAuthEnabled (not ($trustedUpstreamAuth.userIdHeader | default "")) -}}
{{- fail "trustedUpstreamAuth.userIdHeader is required when trustedUpstreamAuth.enabled=true" -}}
{{- end -}}
{{- if and $trustedUpstreamAuthEnabled ($trustedUpstreamAuth.emailToMatrixUserIdTemplate | default "") (not ($trustedUpstreamAuth.emailHeader | default "")) -}}
{{- fail "trustedUpstreamAuth.emailHeader is required when trustedUpstreamAuth.emailToMatrixUserIdTemplate is set" -}}
{{- end -}}
{{- if and $trustedUpstreamAuthEnabled $trustedUpstreamRequireJwt (not ($trustedUpstreamAuth.jwtHeader | default "")) -}}
{{- fail "trustedUpstreamAuth.jwtHeader is required when trustedUpstreamAuth.requireJwt=true" -}}
{{- end -}}
{{- if and $trustedUpstreamAuthEnabled $trustedUpstreamRequireJwt (not ($trustedUpstreamAuth.jwksUrl | default "")) -}}
{{- fail "trustedUpstreamAuth.jwksUrl is required when trustedUpstreamAuth.requireJwt=true" -}}
{{- end -}}
{{- if and $trustedUpstreamAuthEnabled $trustedUpstreamRequireJwt (not ($trustedUpstreamAuth.jwtAudience | default "")) -}}
{{- fail "trustedUpstreamAuth.jwtAudience is required when trustedUpstreamAuth.requireJwt=true" -}}
{{- end -}}
{{- if and $trustedUpstreamAuthEnabled $trustedUpstreamRequireJwt (not ($trustedUpstreamAuth.jwtIssuer | default "")) -}}
{{- fail "trustedUpstreamAuth.jwtIssuer is required when trustedUpstreamAuth.requireJwt=true" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindroom-{{ .Values.customer }}
  namespace: {{ $instanceNamespace }}
  labels:
    app: mindroom
    customer: {{ .Values.customer | quote }}
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: mindroom
      customer: {{ .Values.customer | quote }}
  template:
    metadata:
      labels:
        app: mindroom
        customer: {{ .Values.customer | quote }}
      annotations:
        mindroom.ai/config-hash: {{ $configHash | quote }}
        mindroom.ai/instance-secret-hash: {{ $instanceSecretHash | quote }}
    spec:
      {{- if $controlPlaneNodeName }}
      nodeName: {{ $controlPlaneNodeName }}
      {{- end }}
      {{- if eq $workerBackend "kubernetes" }}
      serviceAccountName: {{ $workerManagerServiceAccountName }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: wait-for-synapse
        image: {{ .Values.mindroom_image | default "ghcr.io/mindroom-ai/mindroom:latest" }}
        imagePullPolicy: {{ .Values.mindroom_image_pull_policy | default "Always" }}
        command: ["/bin/sh", "-ec"]
        args:
        - |
          while true; do
            body="$(curl --silent --show-error --max-time 5 "${SYNAPSE_READY_URL}" || true)"
            if printf '%s' "${body}" | grep -q '"versions"'; then
              echo "Synapse is ready: ${SYNAPSE_READY_URL}"
              exit 0
            fi
            echo "Waiting for Synapse at ${SYNAPSE_READY_URL}"
            sleep 2
          done
        env:
        - name: SYNAPSE_READY_URL
          value: "http://synapse-{{ .Values.customer }}:8008/_matrix/client/versions"
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: mindroom
        image: {{ .Values.mindroom_image | default "ghcr.io/mindroom-ai/mindroom:latest" }}
        imagePullPolicy: {{ .Values.mindroom_image_pull_policy | default "Always" }}
        # Expose the MindRoom port; the runtime serves bot, dashboard, and API traffic.
        ports:
        - containerPort: 8765
          name: api
        env:
        - name: OPENAI_API_KEY_FILE
          value: "/etc/secrets/openai_key"
        - name: ANTHROPIC_API_KEY_FILE
          value: "/etc/secrets/anthropic_key"
        - name: ACCOUNT_ID
          value: {{ .Values.accountId | quote }}
        - name: CUSTOMER_ID
          value: {{ .Values.customer | quote }}
        - name: MINDROOM_STORAGE_PATH
          value: {{ .Values.storagePath }}
        - name: MINDROOM_CONFIG_PATH
          value: "{{ .Values.storagePath }}/config/config.yaml"
        - name: MINDROOM_CONFIG_TEMPLATE
          value: "/app/config.yaml"
        - name: MINDROOM_PUBLIC_URL
          value: "https://{{ .Values.customer }}.{{ .Values.baseDomain }}"
        - name: LOG_LEVEL
          value: "INFO"
        - name: MINDROOM_WORKER_BACKEND
          value: {{ $workerBackend | quote }}
        - name: MINDROOM_WORKER_CLEANUP_INTERVAL_SECONDS
          value: {{ .Values.workerCleanupIntervalSeconds | quote }}
{{ include "mindroom.workerBackendEnv" (dict "workerBackend" $workerBackend "instanceNamespace" $instanceNamespace "workerImage" $workerImage "workerImagePullPolicy" $workerImagePullPolicy "workerServiceAccountName" $workerServiceAccountName "controlPlaneNodeName" $controlPlaneNodeName "values" .Values) | nindent 8 }}
        - name: MINDROOM_SANDBOX_PROXY_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $instanceSecretName }}
              key: sandbox_proxy_token
        - name: MINDROOM_CREDENTIALS_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $instanceSecretName }}
              key: credentials_encryption_key
        - name: MINDROOM_SANDBOX_EXECUTION_MODE
          value: "selective"
        - name: MINDROOM_SANDBOX_PROXY_TOOLS
          value: "shell,file,python"
        - name: MATRIX_HOMESERVER
          value: "http://synapse-{{ .Values.customer }}:8008"
        - name: MATRIX_SERVER_NAME
          value: "{{ .Values.customer }}.{{ .Values.baseDomain }}"
        - name: MATRIX_REGISTRATION_SHARED_SECRET_FILE
          value: "/etc/secrets/matrix_registration_shared_secret"
        - name: MINDROOM_MATRIX_HOMESERVER_STARTUP_TIMEOUT_SECONDS
          value: {{ .Values.matrixHomeserverStartupTimeoutSeconds | quote }}
        - name: SUPABASE_URL
          value: {{ .Values.supabaseUrl | quote }}
        - name: SUPABASE_SERVICE_KEY_FILE
          value: "/etc/secrets/supabase_service_key"
        - name: SUPABASE_ANON_KEY
          value: {{ .Values.supabaseAnonKey | quote }}
        {{- if $trustedUpstreamAuthEnabled }}
        - name: MINDROOM_TRUSTED_UPSTREAM_AUTH_ENABLED
          value: "true"
        - name: MINDROOM_TRUSTED_UPSTREAM_USER_ID_HEADER
          value: {{ $trustedUpstreamAuth.userIdHeader | quote }}
        {{- if $trustedUpstreamAuth.emailHeader }}
        - name: MINDROOM_TRUSTED_UPSTREAM_EMAIL_HEADER
          value: {{ $trustedUpstreamAuth.emailHeader | quote }}
        {{- end }}
        {{- if $trustedUpstreamAuth.matrixUserIdHeader }}
        - name: MINDROOM_TRUSTED_UPSTREAM_MATRIX_USER_ID_HEADER
          value: {{ $trustedUpstreamAuth.matrixUserIdHeader | quote }}
        {{- end }}
        {{- if $trustedUpstreamAuth.emailToMatrixUserIdTemplate }}
        - name: MINDROOM_TRUSTED_UPSTREAM_EMAIL_TO_MATRIX_USER_ID_TEMPLATE
          value: {{ $trustedUpstreamAuth.emailToMatrixUserIdTemplate | quote }}
        {{- end }}
        {{- if $trustedUpstreamRequireJwt }}
        - name: MINDROOM_TRUSTED_UPSTREAM_REQUIRE_JWT
          value: "true"
        - name: MINDROOM_TRUSTED_UPSTREAM_JWT_HEADER
          value: {{ $trustedUpstreamAuth.jwtHeader | quote }}
        - name: MINDROOM_TRUSTED_UPSTREAM_JWKS_URL
          value: {{ $trustedUpstreamAuth.jwksUrl | quote }}
        - name: MINDROOM_TRUSTED_UPSTREAM_JWT_AUDIENCE
          value: {{ $trustedUpstreamAuth.jwtAudience | quote }}
        - name: MINDROOM_TRUSTED_UPSTREAM_JWT_ISSUER
          value: {{ $trustedUpstreamAuth.jwtIssuer | quote }}
        - name: MINDROOM_TRUSTED_UPSTREAM_JWT_EMAIL_CLAIM
          value: {{ $trustedUpstreamAuth.jwtEmailClaim | default "email" | quote }}
        {{- if $trustedUpstreamAuth.jwtUserIdClaim }}
        - name: MINDROOM_TRUSTED_UPSTREAM_JWT_USER_ID_CLAIM
          value: {{ $trustedUpstreamAuth.jwtUserIdClaim | quote }}
        {{- end }}
        {{- if $trustedUpstreamAuth.jwtMatrixUserIdClaim }}
        - name: MINDROOM_TRUSTED_UPSTREAM_JWT_MATRIX_USER_ID_CLAIM
          value: {{ $trustedUpstreamAuth.jwtMatrixUserIdClaim | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        - name: MINDROOM_PLATFORM_LOGIN_URL
          value: "https://app.{{ .Values.baseDomain }}/auth/login"
        - name: OPENROUTER_API_KEY_FILE
          value: "/etc/secrets/openrouter_key"
        - name: GOOGLE_API_KEY_FILE
          value: "/etc/secrets/google_key"
        - name: DEEPSEEK_API_KEY_FILE
          value: "/etc/secrets/deepseek_key"
        - name: HOME
          value: {{ .Values.storagePath }}
        volumeMounts:
        - name: storage
          mountPath: {{ .Values.storagePath }}
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
        - name: api-keys
          mountPath: /etc/secrets
          readOnly: true
        resources:
          {{- toYaml (.Values.mindroomResources | default (dict)) | nindent 10 }}
        # Startup only needs the API process to bind the socket; readiness waits for full bootstrap.
        startupProbe:
          httpGet:
            path: /api/health
            port: api
          periodSeconds: 2
          failureThreshold: 90
        readinessProbe:
          httpGet:
            path: /api/ready
            port: api
          periodSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /api/health
            port: api
          periodSeconds: 10
          failureThreshold: 6
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
{{- if eq $workerBackend "static_runner" }}
{{ include "mindroom.staticRunnerContainer" (dict "values" .Values) | nindent 6 }}
      {{- end }}
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: mindroom-storage-{{ .Values.customer }}
      - name: config
        configMap:
          name: mindroom-config-{{ .Values.customer }}
      - name: api-keys
        secret:
          secretName: {{ $instanceSecretName }}
          defaultMode: 0400
      {{- if eq $workerBackend "static_runner" }}
{{ include "mindroom.staticRunnerVolume" . | nindent 6 }}
      {{- end }}
