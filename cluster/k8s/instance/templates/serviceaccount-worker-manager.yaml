{{- if eq (.Values.workerBackend | default "static_runner") "kubernetes" }}
{{- $workerManagerServiceAccountName := printf "mindroom-worker-manager-%s" .Values.customer -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $workerManagerServiceAccountName }}
  namespace: mindroom-instances
  labels:
    app: mindroom
    customer: {{ .Values.customer | quote }}
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
{{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
