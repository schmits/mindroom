name: Smoke Stacks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/smoke-stacks.yml"
      - "cluster/k8s/**"
      - "docs/deployment/**"
      - "frontend/**"
      - "hatch_build.py"
      - "local/instances/deploy/**"
      - "pyproject.toml"
      - "README.md"
      - "saas-platform/**"
      - "skills/**"
      - "scripts/**"
      - "src/**"
      - "avatars/**"
      - "config.yaml"
      - "run-sandbox-runner.sh"
      - "uv.lock"

permissions:
  contents: read
  packages: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout mindroom
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Checkout mindroom-stack
        uses: actions/checkout@v5
        with:
          repository: mindroom-ai/mindroom-stack
          path: mindroom-stack

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.13

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kind
        run: |
          curl -fsSLo kind "https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64"
          echo "b89aada5a39d620da3fcd16435b7f28d858927dd53f92cbac77686b0588b600d  kind" | sha256sum --check
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
          kind version

      - name: Free runner disk space
        run: |
          echo "Disk usage before cleanup:"
          df -h /

          echo "Removing preinstalled .NET SDKs to make room for smoke images..."
          sudo rm -rf /usr/share/dotnet

          echo "Removing preinstalled Android SDK to make room for smoke images..."
          sudo rm -rf /usr/local/lib/android

          echo "Disk usage after cleanup:"
          df -h /

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build wheel
        run: uv build --wheel

      - name: Create kind cluster
        run: bash cluster/k8s/kind/up.sh
        env:
          KIND_CONFIG: cluster/k8s/kind/kind-config-smoke.yaml

      - name: Build and load images
        run: bash cluster/k8s/kind/build_load_images.sh
        env:
          BUILD_MINDROOM_IMAGES: "1"
          BUILD_PLATFORM_IMAGES: "1"

      - name: Probe runtime images
        run: |
          docker run --rm ghcr.io/mindroom-ai/mindroom:latest mindroom version
          docker run --rm ghcr.io/mindroom-ai/mindroom-minimal:latest mindroom version

      - name: Smoke platform images
        run: python -m scripts.smoke_platform_images

      - name: Install platform chart
        run: bash cluster/k8s/kind/install_platform.sh

      - name: Smoke kind platform and instance
        run: python -m cluster.k8s.kind.smoke_instance

      - name: Smoke mindroom-stack compose
        run: uv run python -m scripts.smoke_mindroom_stack "${GITHUB_WORKSPACE}/mindroom-stack"

      - name: Tear down kind cluster
        if: always()
        run: kind delete cluster --name mindroom
